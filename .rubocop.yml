inherit_mode:
  merge:
    - Exclude

AllCops:
  TargetRubyVersion: 3.5
  NewCops: enable
  Exclude:
    - "tmp/**/*"
    - "vendor/**/*"
    - "pkg/**/*"
    - "examples/**/*"

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Max: 25
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 20

Metrics/ModuleLength:
  Max: 200

Metrics/ClassLength:
  Max: 120

Metrics/AbcSize:
  Max: 22

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Naming/FileName:
  Exclude:
    - "lib/activejob-temporal.rb"

Style/GlobalVars:
  Exclude:
    - "spec/**/*"

Gemspec/DevelopmentDependencies:
  Enabled: false

# RuboCop 1.81 does not accept TargetRubyVersion 4.0 yet; CI still runs Ruby 4.
Gemspec/RequiredRubyVersion:
  Enabled: false
