inherit_mode:
  merge:
    - Exclude

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - "tmp/**/*"
    - "vendor/**/*"
    - "pkg/**/*"
    - "examples/**/*"

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Max: 25
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 20
  Exclude:
    - "lib/activejob/temporal/cancel.rb"
    - "lib/activejob/temporal/signal_query.rb"

Metrics/ModuleLength:
  Max: 200

Metrics/ClassLength:
  Max: 120
  Exclude:
    - "lib/activejob/temporal/inspect.rb"
    - "lib/activejob/temporal/schedule.rb"
    - "lib/activejob/temporal/signal_query.rb"
    - "lib/activejob/temporal/workflows/aj_workflow.rb"

Metrics/AbcSize:
  Max: 22
  Exclude:
    - "lib/activejob/temporal/signal_query.rb"

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Style/Documentation:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Naming/FileName:
  Exclude:
    - "lib/activejob-temporal.rb"

Style/GlobalVars:
  Exclude:
    - "spec/**/*"

Gemspec/DevelopmentDependencies:
  Enabled: false

Gemspec/RequiredRubyVersion:
  Enabled: false
