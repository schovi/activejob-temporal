name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  BUNDLE_GEMFILE: gemfiles/rails_8_1.gemfile
  RUBY_VERSION: "4.0.5"

jobs:
  validate:
    name: Validate Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Verify tag matches gem version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(ruby -Ilib -ractivejob/temporal/version -e 'puts ActiveJob::Temporal::VERSION')"
          test "v${version}" = "${GITHUB_REF_NAME}"
          git describe --tags --exact-match HEAD

      - name: Run release validation
        run: |
          bundle exec rake rubocop
          bundle exec rake spec:unit
          bundle exec rake yard
          bundle exec bundle-audit check --update
          bundle exec rake build
          bundle exec ruby tools/ci/verify_gem_package.rb pkg/activejob-temporal-*.gem

      - name: Install built gem in a clean GEM_HOME
        run: |
          gem_home="$(mktemp -d)"
          gem install --install-dir "$gem_home" --bindir "$gem_home/bin" pkg/activejob-temporal-*.gem --no-document
          GEM_HOME="$gem_home" GEM_PATH="$gem_home" "$gem_home/bin/temporal-worker" --help
          GEM_HOME="$gem_home" GEM_PATH="$gem_home" ruby -e "require 'activejob/temporal'; puts ActiveJob::Temporal::VERSION"
