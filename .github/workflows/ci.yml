name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Linting job - runs once for efficiency
  lint:
    name: Lint (Rubocop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run Rubocop
        run: bundle exec rake rubocop

  # Security scanning - checks for known vulnerabilities in dependencies
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Install bundle-audit
        run: gem install bundler-audit

      - name: Update vulnerability database
        run: bundle-audit update

      - name: Check for vulnerabilities
        run: bundle-audit check --update

  # Unit tests - runs on Ruby matrix
  test-unit:
    name: Unit Tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        ruby: ['4.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run unit tests
        run: bundle exec rake spec:unit
        env:
          TEST_SUITE: unit

      - name: Upload unit coverage to Codecov
        if: matrix.ruby == '4.0'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          flags: unit
          name: ruby-${{ matrix.ruby }}-unit
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload unit test coverage
        if: matrix.ruby == '4.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-ruby-${{ matrix.ruby }}
          path: coverage/

  # Integration tests - runs on Ruby matrix
  test-integration:
    name: Integration Tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        ruby: ['4.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Start Temporal test server
        run: |
          docker compose up -d postgresql temporal
          for i in {1..120}; do
            if docker compose exec -T temporal temporal operator namespace list >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker compose logs temporal
          exit 1

      - name: Configure Temporal test namespace
        run: |
          docker compose exec -T temporal temporal operator namespace describe test >/dev/null 2>&1 ||
            docker compose exec -T temporal temporal operator namespace create test
          for i in {1..60}; do
            if docker compose exec -T temporal temporal operator namespace describe test >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          required_search_attributes_present() {
            attributes=$(docker compose exec -T temporal temporal operator search-attribute list -n test 2>/dev/null || true)
            for attribute in ajClass ajQueue ajJobId ajEnqueuedAt ajTenantId ajTags; do
              if ! grep -q "$attribute" <<<"$attributes"; then
                return 1
              fi
            done
          }

          for i in {1..60}; do
            if required_search_attributes_present; then
              exit 0
            fi
            docker compose exec -T temporal temporal operator search-attribute create -n test \
              --name ajClass --type Keyword \
              --name ajQueue --type Keyword \
              --name ajJobId --type Keyword \
              --name ajEnqueuedAt --type Datetime \
              --name ajTenantId --type Int \
              --name ajTags --type KeywordList || true
            sleep 1
          done
          required_search_attributes_present

      - name: Run integration tests
        run: bundle exec rake spec:integration
        env:
          TEST_SUITE: integration

      - name: Upload integration coverage to Codecov
        if: matrix.ruby == '4.0'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          flags: integration
          name: ruby-${{ matrix.ruby }}-integration
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload integration test coverage
        if: matrix.ruby == '4.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-ruby-${{ matrix.ruby }}
          path: coverage/

      - name: Stop Temporal test server
        if: always()
        run: docker compose down -v

  # Build gem - runs once to verify gem can be built
  build:
    name: Build Gem
    runs-on: ubuntu-latest
    needs: [lint, security, test-unit, test-integration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Build gem
        run: gem build activejob-temporal.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-package
          path: activejob-temporal-*.gem
