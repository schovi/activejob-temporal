name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Linting job - runs once for efficiency
  lint:
    name: Lint (Rubocop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Run Rubocop
        run: bundle exec rake rubocop

  # Security scanning - checks for known vulnerabilities in dependencies
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Install bundle-audit
        run: gem install bundler-audit

      - name: Update vulnerability database
        run: bundle-audit update

      - name: Check for vulnerabilities
        run: bundle-audit check --update

  # Unit tests - runs on Ruby matrix
  test-unit:
    name: Unit Tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['4.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run unit tests
        run: bundle exec rake spec:unit
        env:
          TEST_SUITE: unit

      - name: Upload unit test coverage
        if: matrix.ruby == '4.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-ruby-${{ matrix.ruby }}
          path: coverage/

  # Integration tests - runs on Ruby matrix
  test-integration:
    name: Integration Tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['4.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Start Temporal test server
        run: |
          docker compose up -d postgresql temporal
          for i in {1..120}; do
            if docker compose exec -T temporal temporal operator namespace list >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker compose logs temporal
          exit 1

      - name: Configure Temporal test namespace
        run: |
          docker compose exec -T temporal temporal operator namespace describe test >/dev/null 2>&1 ||
            docker compose exec -T temporal temporal operator namespace create test
          docker compose exec -T temporal temporal operator search-attribute create -n test \
            --name ajClass --type Keyword \
            --name ajQueue --type Keyword \
            --name ajJobId --type Keyword \
            --name ajEnqueuedAt --type Datetime \
            --name ajTenantId --type Int || true

      - name: Run integration tests
        run: bundle exec rake spec:integration
        env:
          TEST_SUITE: integration

      - name: Upload integration test coverage
        if: matrix.ruby == '4.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-ruby-${{ matrix.ruby }}
          path: coverage/

      - name: Stop Temporal test server
        if: always()
        run: docker compose down -v

  # Build gem - runs once to verify gem can be built
  build:
    name: Build Gem
    runs-on: ubuntu-latest
    needs: [lint, security, test-unit, test-integration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Build gem
        run: gem build activejob-temporal.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-package
          path: activejob-temporal-*.gem
