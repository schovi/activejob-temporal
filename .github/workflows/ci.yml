name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PRIMARY_RUBY: "4.0.5"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.PRIMARY_RUBY }}
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rake rubocop

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.PRIMARY_RUBY }}
          bundler-cache: true

      - name: Check for vulnerable dependencies
        run: bundle exec bundle-audit check --update

  mutation:
    name: Mutation Tests
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.PRIMARY_RUBY }}
          bundler-cache: true

      - name: Run mutation tests
        run: bundle exec rake mutation

  test-unit:
    name: Unit Tests (Ruby ${{ matrix.ruby }}, Rails 8.1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        ruby: [ "4.0.0", "4.0.5" ]
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run unit tests
        run: bundle exec rake spec:unit
        env:
          TEST_SUITE: unit

      - name: Upload unit coverage to Codecov
        if: matrix.ruby == '4.0.5'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          flags: unit
          name: ruby-${{ matrix.ruby }}-rails-8.1-unit
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload unit test coverage
        if: matrix.ruby == '4.0.5'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-ruby-${{ matrix.ruby }}-rails-8.1
          path: coverage/

  test-integration:
    name: Integration Tests (Rails 8.1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.PRIMARY_RUBY }}
          bundler-cache: true

      - name: Start and configure Temporal test server
        run: tools/ci/prepare_temporal.sh postgresql temporal

      - name: Run integration tests
        run: bundle exec rake spec:integration
        env:
          TEST_SUITE: integration

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          flags: integration
          name: ruby-${{ env.PRIMARY_RUBY }}-rails-8.1-integration
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-ruby-${{ env.PRIMARY_RUBY }}-rails-8.1
          path: coverage/

      - name: Stop Temporal test server
        if: always()
        run: docker compose down -v

  test-chaos:
    name: Chaos Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.PRIMARY_RUBY }}
          bundler-cache: true

      - name: Start and configure Temporal chaos test server
        run: tools/ci/prepare_temporal.sh postgresql temporal toxiproxy

      - name: Run chaos tests
        run: bundle exec rake spec:chaos
        env:
          TEST_SUITE: chaos

      - name: Upload chaos coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          flags: chaos
          name: ruby-${{ env.PRIMARY_RUBY }}-rails-8.1-chaos
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload chaos test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-chaos-ruby-${{ env.PRIMARY_RUBY }}-rails-8.1
          path: coverage/

      - name: Stop Temporal chaos test server
        if: always()
        run: docker compose down -v

  example-basic-rails-app:
    name: Example Rails App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: examples/basic_rails_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true
          working-directory: examples/basic_rails_app

      - name: Prepare test database
        run: bundle exec rails db:prepare
        env:
          RAILS_ENV: test

      - name: Run example app tests
        run: bundle exec rails test
        env:
          RAILS_ENV: test

      - name: Run example app RuboCop
        run: bundle exec bin/rubocop

      - name: Run example app Brakeman
        run: bundle exec bin/brakeman --no-pager --quiet

  build:
    name: Build and Verify Gem
    runs-on: ubuntu-latest
    needs: [lint, security, mutation, test-unit, test-integration, test-chaos, example-basic-rails-app]
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8_1.gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.PRIMARY_RUBY }}
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - name: Verify gem package contents
        run: bundle exec ruby tools/ci/verify_gem_package.rb pkg/activejob-temporal-*.gem

      - name: Install built gem in a clean GEM_HOME
        run: |
          gem_home="$(mktemp -d)"
          gem install --install-dir "$gem_home" --bindir "$gem_home/bin" pkg/activejob-temporal-*.gem --no-document
          GEM_HOME="$gem_home" GEM_PATH="$gem_home" "$gem_home/bin/temporal-worker" --help
          GEM_HOME="$gem_home" GEM_PATH="$gem_home" ruby -e "require 'activejob/temporal'; puts ActiveJob::Temporal::VERSION"

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-package
          path: pkg/activejob-temporal-*.gem
