name: Temporal SDK Compatibility

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  contract:
    name: Temporal SDK ${{ matrix.temporalio-version }} Contract Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - temporalio-version: "1.4.0"
            temporalio-requirement: "= 1.4.0"
          - temporalio-version: "1.4.x latest"
            temporalio-requirement: "~> 1.4"

    env:
      BUNDLE_GEMFILE: gemfiles/temporalio_contract.gemfile
      TEMPORALIO_VERSION: ${{ matrix.temporalio-requirement }}
      TEST_SUITE: contract

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: false

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Start and configure Temporal test server
        run: tools/ci/prepare_temporal.sh postgresql temporal

      - name: Run contract tests
        run: bundle exec rake spec:contract

      - name: Stop Temporal test server
        if: always()
        run: docker compose down -v
