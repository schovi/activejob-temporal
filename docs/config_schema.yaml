# activejob-temporal Configuration Schema
# Version 1.0 - Canonical reference for all configuration options
#
# This schema documents all configuration attributes for the activejob-temporal gem.
# It serves as the authoritative source for configuration validation rules, types,
# defaults, and environment variable mappings.

metadata:
  schema_version: "1.0"
  last_updated: "2025-10-31"
  contact: "ruby@temporal.io"
  repository: "https://github.com/temporalio/activejob-temporal"
  documentation: "https://github.com/temporalio/activejob-temporal/blob/main/docs/configuration_reference.md"
  description: "Configuration schema for activejob-temporal adapter"

# Configuration attributes organized by functional category
attributes:

  # Connection settings control how the adapter connects to Temporal
  connection:
    - name: target
      type: String
      default: "127.0.0.1:7233"
      validation_rules:
        - "Must match host:port format (alphanumeric, dots, hyphens in host; 1-5 digit port)"
        - "Validated by regex: /^[\\w.-]+:\\d{1,5}$/"
        - "Examples: localhost:7233, temporal.example.com:7233, 10.0.0.1:7233"
      description: "Temporal server host and port for gRPC connection. Supports DNS names and IP addresses."
      env_var_name: TEMPORAL_TARGET
      example: "temporal.example.com:7233"

    - name: namespace
      type: String
      default: "default"
      validation_rules:
        - "Must contain only alphanumeric characters, hyphens, and underscores"
        - "Validated by regex: /^[\\w-]+$/"
        - "Cannot contain spaces or special characters except hyphen and underscore"
      description: "Temporal namespace for workflow and activity execution. Namespaces provide logical isolation."
      env_var_name: TEMPORAL_NAMESPACE
      example: "production"

    - name: identity
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "No format restrictions when provided"
      description: "Optional worker identity string for observability and debugging. Useful in multi-worker deployments to identify which worker executed a workflow."
      env_var_name: null
      example: "worker-01-us-west-2"

  # Timing settings control timeouts and intervals
  timing:
    - name: default_activity_timeout
      type: Duration
      default: "15.minutes"
      validation_rules:
        - "Must be a positive duration (Numeric or ActiveSupport::Duration)"
        - "Must be > 0 seconds"
        - "Can be set as numeric seconds (900) or ActiveSupport::Duration (15.minutes)"
      description: "Default start_to_close timeout for activity execution. Determines how long an activity can run before Temporal times it out."
      env_var_name: null
      example: "30.minutes"

    - name: default_retry_initial_interval
      type: Duration
      default: "30.seconds"
      validation_rules:
        - "Must be a positive duration (Numeric or ActiveSupport::Duration)"
        - "Must be > 0 seconds"
        - "Can be set as numeric seconds (30) or ActiveSupport::Duration (30.seconds)"
      description: "Initial interval before the first retry attempt. This is the base delay before exponential backoff is applied."
      env_var_name: null
      example: "10.seconds"

  # Retry settings control failure recovery behavior
  retry:
    - name: default_retry_backoff
      type: Float
      default: 2.0
      validation_rules:
        - "Must be >= 1.0"
        - "Typical values: 1.0 (linear), 2.0 (exponential doubling), 1.5 (moderate exponential)"
      description: "Exponential backoff coefficient for retry delays. Each retry interval is multiplied by this factor. Value of 2.0 doubles the delay on each retry."
      env_var_name: null
      example: 1.5

    - name: default_retry_max_attempts
      type: Integer
      default: 1
      validation_rules:
        - "Must be >= 0"
        - "Value of 0 means no retries (fail immediately)"
        - "Value of 1 means one retry after initial failure"
      description: "Maximum number of retry attempts when a job does not specify its own retry_on rules. Does not include the initial attempt."
      env_var_name: null
      example: 3

  # Operational settings control runtime behavior and observability
  operational:
    - name: task_queue_prefix
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "No format restrictions when provided"
        - "Applied to all task queue names generated by the adapter"
      description: "Optional prefix applied to every task queue name. Useful for multi-tenant deployments or environment separation."
      env_var_name: TEMPORAL_TASK_QUEUE_PREFIX
      example: "rails-production-"

    - name: logger
      type: Logger
      default: "Rails.logger or Logger.new($stdout)"
      validation_rules:
        - "Must be a Logger-compatible object"
        - "No validation performed on assignment"
      description: "Logger instance for gem output. Defaults to Rails.logger if available, otherwise Logger.new($stdout). Used for adapter-level logging."
      env_var_name: null
      example: "Logger.new('log/temporal.log')"

    - name: enable_tracing
      type: Boolean
      default: true
      validation_rules:
        - "Must be boolean (true or false)"
        - "No other validation performed"
      description: "Enable OpenTelemetry distributed tracing instrumentation. When enabled, the adapter emits spans for workflow and activity execution."
      env_var_name: null
      example: false

    - name: max_payload_size_kb
      type: Integer
      default: 250
      validation_rules:
        - "Must be > 0"
        - "Must be <= 2097152 KB (2 GB)"
        - "Temporal has a hard limit of ~2 MB for practical use"
        - "Default 250 KB is recommended for most use cases"
      description: "Maximum allowed size (in kilobytes) for serialized job payloads. Exceeding this limit raises ActiveJob::SerializationError before enqueuing."
      env_var_name: TEMPORAL_MAX_PAYLOAD_SIZE_KB
      example: 512

    - name: enable_search_attributes
      type: Boolean
      default: true
      validation_rules:
        - "Must be boolean (true or false)"
        - "No other validation performed"
      description: "Enable Temporal search attributes for job metadata. When enabled, workflows are tagged with ajClass, ajQueue, ajJobId, ajEnqueuedAt, and ajTenantId for filtering in Temporal UI."
      env_var_name: null
      example: false

# Practical configuration examples for common deployment scenarios
examples:

  # Local development with Temporal test server
  development:
    description: "Local development configuration using Temporal test server"
    use_case: "Development and testing on local machine"
    configuration:
      target: "127.0.0.1:7233"
      namespace: "default"
      task_queue_prefix: null
      default_activity_timeout: "15.minutes"
      default_retry_initial_interval: "30.seconds"
      default_retry_backoff: 2.0
      default_retry_max_attempts: 1
      logger: "Rails.logger"
      enable_tracing: true
      max_payload_size_kb: 250
      enable_search_attributes: true
      identity: null
    code_example: |
      # config/initializers/activejob_temporal.rb
      ActiveJob::Temporal.configure do |config|
        # All defaults work for local development
        # Temporal test server runs on localhost:7233
      end

  # Production deployment with Temporal Cloud
  production:
    description: "Production configuration with Temporal Cloud and TLS"
    use_case: "Production deployment with observability and reliability"
    configuration:
      target: "temporal.production.example.com:7233"
      namespace: "production"
      task_queue_prefix: "rails-app-"
      default_activity_timeout: "15.minutes"
      default_retry_initial_interval: "30.seconds"
      default_retry_backoff: 2.0
      default_retry_max_attempts: 3
      logger: "Rails.logger"
      enable_tracing: true
      max_payload_size_kb: 250
      enable_search_attributes: true
      identity: "worker-01-us-east-1"
    code_example: |
      # config/initializers/activejob_temporal.rb
      ActiveJob::Temporal.configure do |config|
        config.target = ENV.fetch('TEMPORAL_TARGET')
        config.namespace = 'production'
        config.task_queue_prefix = 'rails-app-'
        config.default_retry_max_attempts = 3
        config.identity = ENV.fetch('HOSTNAME', 'unknown-worker')
      end

  # High-throughput scenario with custom tuning
  high_throughput:
    description: "High-throughput configuration with relaxed limits and custom timeouts"
    use_case: "Heavy workload scenarios requiring larger payloads and longer timeouts"
    configuration:
      target: "temporal.production.example.com:7233"
      namespace: "production"
      task_queue_prefix: "heavy-jobs-"
      default_activity_timeout: "30.minutes"
      default_retry_initial_interval: "1.minute"
      default_retry_backoff: 1.5
      default_retry_max_attempts: 5
      logger: "Rails.logger"
      enable_tracing: true
      max_payload_size_kb: 512
      enable_search_attributes: true
      identity: "worker-heavy-01"
    code_example: |
      # config/initializers/activejob_temporal.rb
      ActiveJob::Temporal.configure do |config|
        config.target = ENV.fetch('TEMPORAL_TARGET')
        config.namespace = 'production'
        config.task_queue_prefix = 'heavy-jobs-'
        config.default_activity_timeout = 30.minutes
        config.default_retry_initial_interval = 1.minute
        config.default_retry_backoff = 1.5
        config.default_retry_max_attempts = 5
        config.max_payload_size_kb = 512
        config.identity = 'worker-heavy-01'
      end

# Configuration validation notes
validation:
  description: "The Configuration class provides a validate! method for comprehensive validation"
  usage: |
    # Call validate! explicitly after configuration to ensure all settings are valid
    ActiveJob::Temporal.configure do |config|
      config.target = "temporal.example.com:7233"
      config.namespace = "production"
    end
    ActiveJob::Temporal.config.validate!  # Raises ConfigurationError if invalid

  validation_methods:
    - "validate_target! - Checks host:port format"
    - "validate_namespace! - Checks namespace format"
    - "validate_timeouts! - Ensures timeouts are positive durations"
    - "validate_retry_settings! - Validates backoff and max_attempts ranges"
    - "validate_payload_size! - Ensures payload size is within bounds"

  error_handling: "All validation errors raise ActiveJob::Temporal::ConfigurationError with descriptive messages"

# Type system reference
type_reference:
  String: "Ruby String object"
  Integer: "Ruby Integer (Fixnum or Bignum)"
  Float: "Ruby Float (decimal number)"
  Boolean: "Ruby true or false"
  Duration: "Numeric (seconds) or ActiveSupport::Duration object (e.g., 15.minutes, 30.seconds)"
  Logger: "Ruby Logger or Logger-compatible object with standard logging interface"

# Environment variable priority
environment_variables:
  description: "Environment variables provide 12-factor app compliance"
  priority: "ENV vars override defaults but are overridden by explicit configuration in initializers"
  supported_variables:
    - name: TEMPORAL_TARGET
      maps_to: target
      example: "temporal.production.com:7233"

    - name: TEMPORAL_NAMESPACE
      maps_to: namespace
      example: "production"

    - name: TEMPORAL_TASK_QUEUE_PREFIX
      maps_to: task_queue_prefix
      example: "rails-app-"

    - name: TEMPORAL_MAX_PAYLOAD_SIZE_KB
      maps_to: max_payload_size_kb
      example: "512"
      note: "Must be converted to integer"
