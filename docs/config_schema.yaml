# activejob-temporal Configuration Schema
# Version 1.0 - Canonical reference for all configuration options
#
# This schema documents all configuration attributes for the activejob-temporal gem.
# It serves as the authoritative source for configuration validation rules, types,
# defaults, and environment variable mappings.

metadata:
  schema_version: "1.0"
  last_updated: "2026-05-21"
  contact: "ruby@temporal.io"
  repository: "https://github.com/schovi/activejob-temporal"
  documentation: "https://github.com/schovi/activejob-temporal/blob/main/docs/configuration_reference.md"
  description: "Configuration schema for activejob-temporal adapter"

# Configuration attributes organized by functional category
attributes:

  # Connection settings control how the adapter connects to Temporal
  connection:
    - name: target
      type: String
      default: "127.0.0.1:7233"
      validation_rules:
        - "Must match host:port format (alphanumeric, dots, hyphens in host; 1-5 digit port)"
        - "Validated by regex: /^[\\w.-]+:\\d{1,5}$/"
        - "Examples: localhost:7233, temporal.example.com:7233, 10.0.0.1:7233"
      description: "Temporal server host and port for gRPC connection. Supports DNS names and IP addresses."
      env_var_name: ACTIVEJOB_TEMPORAL_TARGET
      example: "temporal.example.com:7233"

    - name: namespace
      type: String
      default: "default"
      validation_rules:
        - "Must contain only alphanumeric characters, hyphens, and underscores"
        - "Validated by regex: /^[\\w-]+$/"
        - "Cannot contain spaces or special characters except hyphen and underscore"
      description: "Temporal namespace for workflow and activity execution. Namespaces provide logical isolation."
      env_var_name: ACTIVEJOB_TEMPORAL_NAMESPACE
      example: "production"

    - name: tls
      type: Object
      default: null
      validation_rules:
        - "Optional SDK-native TLS options, hash-compatible TLS settings, true, false, or nil"
      description: "Optional TLS override passed to the Temporal Ruby SDK. Prefer file path settings for certificate rotation."
      env_var_name: null
      example:
        client_cert: "File.read('/etc/certs/client.pem')"
        client_private_key: "File.read('/etc/certs/client-key.pem')"
        domain: "temporal.example.com"

    - name: tls_cert_path
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must be a readable file"
        - "Must be configured together with tls_key_path"
      description: "Client certificate file path for mTLS. The worker reads the file when building or reloading a Temporal client."
      env_var_name: ACTIVEJOB_TEMPORAL_TLS_CERT_PATH
      example: "/etc/certs/client.pem"

    - name: tls_key_path
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must be a readable file"
        - "Must be configured together with tls_cert_path"
      description: "Client private key file path for mTLS. The worker reads the file when building or reloading a Temporal client."
      env_var_name: ACTIVEJOB_TEMPORAL_TLS_KEY_PATH
      example: "/etc/certs/client-key.pem"

    - name: tls_server_root_ca_cert_path
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must be a readable file"
      description: "Root CA certificate file path for self-hosted Temporal TLS verification."
      env_var_name: ACTIVEJOB_TEMPORAL_TLS_SERVER_ROOT_CA_CERT_PATH
      example: "/etc/certs/root-ca.pem"

    - name: tls_domain
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must not be blank"
      description: "Optional TLS SNI domain override."
      env_var_name: ACTIVEJOB_TEMPORAL_TLS_DOMAIN
      example: "temporal.example.com"

    - name: tls_cert_watch
      type: Boolean
      default: false
      validation_rules:
        - "Must be true or false"
        - "When true, at least one TLS file path must be configured"
      description: "Watch configured TLS files and reload worker clients when certificate files change."
      env_var_name: ACTIVEJOB_TEMPORAL_TLS_CERT_WATCH
      example: true

    - name: tls_reload_signal
      type: String
      default: "HUP"
      validation_rules:
        - "Must be a trappable signal name such as HUP or USR1"
        - "KILL and STOP are rejected because Ruby cannot trap them"
      description: "Signal used by workers for manual TLS client reload."
      env_var_name: ACTIVEJOB_TEMPORAL_TLS_RELOAD_SIGNAL
      example: "HUP"

    - name: identity
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "No format restrictions when provided"
      description: "Optional worker identity string for observability and debugging. Useful in multi-worker deployments to identify which worker executed a workflow."
      env_var_name: null
      example: "worker-01-us-west-2"

  # Timing settings control timeouts and intervals
  timing:
    - name: default_activity_timeout
      type: Duration
      default: "15.minutes"
      validation_rules:
        - "Must be a positive duration (Numeric or ActiveSupport::Duration)"
        - "Must be > 0 seconds"
        - "Can be set as numeric seconds (900) or ActiveSupport::Duration (15.minutes)"
      description: "Default start_to_close timeout for activity execution. Determines how long an activity can run before Temporal times it out."
      env_var_name: null
      example: "30.minutes"

    - name: default_retry_initial_interval
      type: Duration
      default: "30.seconds"
      validation_rules:
        - "Must be a positive duration (Numeric or ActiveSupport::Duration)"
        - "Must be > 0 seconds"
        - "Can be set as numeric seconds (30) or ActiveSupport::Duration (30.seconds)"
      description: "Initial interval before the first retry attempt. This is the base delay before exponential backoff is applied."
      env_var_name: null
      example: "10.seconds"

  # Retry settings control failure recovery behavior
  retry:
    - name: default_retry_backoff
      type: Float
      default: 2.0
      validation_rules:
        - "Must be >= 1.0"
        - "Typical values: 1.0 (linear), 2.0 (exponential doubling), 1.5 (moderate exponential)"
      description: "Exponential backoff coefficient for retry delays. Each retry interval is multiplied by this factor. Value of 2.0 doubles the delay on each retry."
      env_var_name: null
      example: 1.5

    - name: default_retry_max_attempts
      type: Integer
      default: 1
      validation_rules:
        - "Must be >= 0"
        - "Value of 0 means no retries (fail immediately)"
        - "Value of 1 means one retry after initial failure"
      description: "Maximum number of retry attempts when a job does not specify its own retry_on rules. Does not include the initial attempt."
      env_var_name: null
      example: 3

    - name: dead_letter_queue
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must not be blank"
      description: "Temporal task queue for parked dead letter workflows after activity retries are exhausted."
      env_var_name: ACTIVEJOB_TEMPORAL_DEAD_LETTER_QUEUE
      example: "failed_jobs"

    - name: dead_letter_after_attempts
      type: Integer
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, dead_letter_queue must also be configured"
        - "Must be greater than 0"
        - "Overrides generated activity retry maximum_attempts for DLQ-enabled jobs"
      description: "Retry attempt threshold before routing failed jobs to the configured dead letter queue."
      env_var_name: ACTIVEJOB_TEMPORAL_DEAD_LETTER_AFTER_ATTEMPTS
      example: 3

  # Operational settings control runtime behavior and observability
  operational:
    - name: task_queue_prefix
      type: String
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "No format restrictions when provided"
        - "Applied to all task queue names generated by the adapter"
      description: "Optional prefix applied to every task queue name. Useful for multi-tenant deployments or environment separation."
      env_var_name: ACTIVEJOB_TEMPORAL_TASK_QUEUE_PREFIX
      example: "rails-production-"

    - name: task_queue
      type: String
      default: "default"
      validation_rules:
        - "No explicit validation performed"
      description: "Default task queue name for workers."
      env_var_name: ACTIVEJOB_TEMPORAL_TASK_QUEUE
      example: "default"

    - name: priority_task_queues
      type: Hash
      default: {}
      validation_rules:
        - "Must be a hash"
        - "Priority keys must be integers"
        - "Task queue names must be present"
        - "Applied before task_queue_prefix"
      description: "Optional mapping from numeric ActiveJob priority values to Temporal task queue names. When a job priority is mapped, that task queue is used instead of the job's queue_as value."
      env_var_name: null
      example:
        10: "high_priority"
        50: "bulk_priority"
        90: "low_priority"

    - name: rate_limiter
      type: Object
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must respond to wait_time_for(rate_limits) or call(rate_limits)"
        - "The limiter method must accept one rate_limits argument"
      description: "Limiter backend used by RateLimitActivity. Return 0 to run now, or a finite positive number of seconds to wait before the workflow rechecks."
      env_var_name: null
      example: "ActiveJob::Temporal::RateLimiters::Memory.new"

    - name: global_rate_limit
      type: Hash
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, rate_limiter must also be configured"
        - "Must include a positive integer limit"
        - "Must include a finite positive period via per or interval"
      description: "Global throughput rule applied to every job payload before per-job rate limits. Serialized rate-limit metadata remains plaintext for deterministic replay."
      env_var_name: null
      example:
        limit: 1000
        per: ":minute"

    - name: logger
      type: Logger
      default: "Rails.logger or Logger.new($stdout)"
      validation_rules:
        - "Must be a Logger-compatible object"
        - "No validation performed on assignment"
      description: "Logger instance for gem output. Defaults to Rails.logger if available, otherwise Logger.new($stdout). Used for adapter-level logging."
      env_var_name: null
      example: "Logger.new('log/temporal.log')"

    - name: audit_log
      type: Boolean
      default: false
      validation_rules:
        - "Must be true or false"
      description: "Enables structured audit events for job lifecycle changes. Emits job.enqueued, job.started, job.completed, job.failed, job.cancelled, and schedule.created."
      env_var_name: ACTIVEJOB_TEMPORAL_AUDIT_LOG
      example: true

    - name: audit_logger
      type: Logger
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must respond to #info"
      description: "Optional logger destination for audit events. Falls back to logger when nil."
      env_var_name: null
      example: "Logger.new('log/activejob_temporal_audit.log')"

    - name: validation_level
      type: Symbol
      default: ":strict"
      validation_rules:
        - "Must be one of: :strict, :warn, :none"
        - ":strict raises ActiveJob::Temporal::ConfigurationError"
        - ":warn logs validation warnings and allows configuration to continue"
        - ":none skips validation entirely"
      description: "Controls how configuration validation failures are handled. Use :strict for normal boot, :warn for gradual migrations, and :none only for intentional partial test configuration."
      env_var_name: null
      example: ":warn"

    - name: enable_tracing
      type: Boolean
      default: true
      validation_rules:
        - "Must be boolean (true or false)"
        - "No other validation performed"
      description: "Enable OpenTelemetry distributed tracing instrumentation. When enabled, the adapter emits spans for workflow and activity execution."
      env_var_name: null
      example: false

    - name: metrics_provider
      type: Symbol
      default: ":none"
      validation_rules:
        - "Must be one of: :none, :prometheus"
        - ":none disables built-in metrics"
        - ":prometheus records built-in Prometheus metrics"
      description: "Metrics provider for built-in job and worker metrics."
      env_var_name: ACTIVEJOB_TEMPORAL_METRICS_PROVIDER
      example: ":prometheus"

    - name: metrics_port
      type: Integer
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must be between 1 and 65535"
      description: "Optional HTTP port for the worker Prometheus scrape endpoint at GET /metrics."
      env_var_name: ACTIVEJOB_TEMPORAL_METRICS_PORT
      example: 9394

    - name: metrics_bind
      type: String
      default: "127.0.0.1"
      validation_rules:
        - "Must be present"
        - "Use 0.0.0.0 only when Prometheus must scrape from outside the worker process namespace"
      description: "Bind address for the worker Prometheus metrics endpoint."
      env_var_name: ACTIVEJOB_TEMPORAL_METRICS_BIND
      example: "0.0.0.0"

    - name: middleware_chain
      type: Middleware::Chain
      default: "ActiveJob::Temporal::Middleware::Chain.new"
      validation_rules:
        - "Must respond to #add for registration"
        - "Must respond to #call for activity execution"
      description: "Ordered middleware chain used by config.add_middleware to wrap job execution inside AjRunnerActivity. Middleware receives the ActiveJob instance and yields to continue execution."
      env_var_name: null
      example: "config.add_middleware TracingMiddleware"

    - name: max_payload_size_kb
      type: Integer
      default: 250
      validation_rules:
        - "Must be > 0"
        - "Must be <= 2097152 KB (2 GB)"
        - "Temporal has a hard limit of ~2 MB for practical use"
        - "Default 250 KB is recommended for most use cases"
      description: "Maximum allowed size (in kilobytes) for serialized job payloads. Exceeding this limit raises ActiveJob::SerializationError before enqueuing."
      env_var_name: ACTIVEJOB_TEMPORAL_MAX_PAYLOAD_SIZE_KB
      example: 512

    - name: payload_serializer
      type: Symbol
      default: ":json"
      validation_rules:
        - "Must be one of: :json, :message_pack, :msgpack, :marshal"
        - ":json keeps the legacy inline payload format"
        - ":message_pack and :msgpack require the msgpack gem at runtime"
        - ":marshal must only be used with trusted workflow histories and compatible Ruby/application code"
      description: "Serializer used for new job execution payloads. Non-JSON serializers wrap the ActiveJob-normalized payload in a versioned envelope while workflow-control metadata remains plaintext."
      env_var_name: ACTIVEJOB_TEMPORAL_PAYLOAD_SERIALIZER
      example: ":message_pack"

    - name: encrypt_payload
      type: Boolean
      default: false
      validation_rules:
        - "Must be true or false"
        - "When true, encryption_key must be present and valid"
      description: "Encrypt serialized job execution payloads before sending them to Temporal. Plaintext workflow-control metadata remains available for deterministic replay."
      env_var_name: ACTIVEJOB_TEMPORAL_ENCRYPT_PAYLOAD
      example: true

    - name: encryption_key
      type: String or Hash
      default: null
      validation_rules:
        - "Required when encrypt_payload is true"
        - "Must be a Base64-encoded 32-byte AES-256-GCM key, or a hash with id and key"
      description: "Primary payload encryption key used for new encrypted payloads. Hash metadata supplies the key ID used by version 2 envelopes."
      env_var_name: ACTIVEJOB_TEMPORAL_ENCRYPTION_KEY
      example:
        id: "2026-05"
        key: "SecureRandom.base64(32)"

    - name: encryption_old_keys
      type: Array
      default: []
      validation_rules:
        - "Must be an array"
        - "Every value must be a Base64-encoded 32-byte AES-256-GCM key, or a hash with id and key"
      description: "Previous payload encryption keys accepted for decryption during key rotation. Hash entries may include decrypt_until."
      env_var_name: null
      example:
        - id: "2026-04"
          key: "previous-base64-key"
          decrypt_until: "2026-09-01T00:00:00Z"

    - name: enable_search_attributes
      type: Boolean
      default: true
      validation_rules:
        - "Must be boolean (true or false)"
        - "No other validation performed"
      description: "Enable Temporal search attributes for job metadata. When enabled, workflows are tagged with ajClass, ajQueue, ajJobId, ajEnqueuedAt, ajTenantId, and custom ajTags for filtering in Temporal UI."
      env_var_name: null
      example: false

    - name: workflow_id_generator
      type: Callable
      default: null
      validation_rules:
        - "Optional field, can be nil"
        - "When provided, must respond to #call and accept an ActiveJob instance"
        - "Generated workflow ID must be a String"
        - "Generated workflow ID length must be 1..255 characters"
        - "Generated workflow ID may contain only letters, numbers, underscores, hyphens, periods, and colons"
      description: "Optional callable for custom Temporal workflow ID generation. When unset, IDs use ajwf:<ClassName>:<job_id>."
      env_var_name: null
      example: "->(job) { \"tenant-#{job.arguments.first.tenant_id}:ajwf:#{job.class.name}:#{job.job_id}\" }"

    - name: max_concurrent_activities
      type: Integer
      default: 100
      validation_rules:
        - "Must be > 0"
        - "Must be a positive integer"
        - "Recommended starting value is 100"
        - "Increase to 200-500 for high-throughput scenarios with sufficient memory"
      description: "Maximum activity task polling capacity per worker process. This setting is used by the Temporal worker process to control activity throughput. Higher capacity can use more memory when jobs run in parallel. Monitor worker memory usage when increasing beyond 100."
      env_var_name: ACTIVEJOB_TEMPORAL_MAX_CONCURRENT_ACTIVITIES
      example: 200

    - name: max_concurrent_workflow_tasks
      type: Integer
      default: 5
      validation_rules:
        - "Must be > 0"
        - "Must be a positive integer"
        - "Recommended starting value is 5"
        - "Increase to 25-50 for high-throughput scenarios"
      description: "Maximum number of workflow tasks that can be polled concurrently per worker process. This setting is used by the Temporal worker process to control workflow task processing capacity."
      env_var_name: ACTIVEJOB_TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS
      example: 20

# Practical configuration examples for common deployment scenarios
examples:

  # Local development with Temporal test server
  development:
    description: "Local development configuration using Temporal test server"
    use_case: "Development and testing on local machine"
    configuration:
      target: "127.0.0.1:7233"
      namespace: "default"
      task_queue: "default"
      task_queue_prefix: null
      priority_task_queues: {}
      default_activity_timeout: "15.minutes"
      default_retry_initial_interval: "30.seconds"
      default_retry_backoff: 2.0
      default_retry_max_attempts: 1
      logger: "Rails.logger"
      audit_log: false
      audit_logger: null
      validation_level: ":strict"
      enable_tracing: true
      metrics_provider: ":none"
      metrics_port: null
      metrics_bind: "127.0.0.1"
      middleware_chain: "empty"
      max_payload_size_kb: 250
      payload_serializer: ":json"
      encrypt_payload: false
      encryption_key: null
      encryption_old_keys: []
      enable_search_attributes: true
      identity: null
      tls: null
      tls_cert_path: null
      tls_key_path: null
      tls_server_root_ca_cert_path: null
      tls_domain: null
      tls_cert_watch: false
      tls_reload_signal: "HUP"
    code_example: |
      # config/initializers/activejob_temporal.rb
      ActiveJob::Temporal.configure do |config|
        # All defaults work for local development
        # Temporal test server runs on localhost:7233
      end

  # Production deployment with Temporal Cloud
  production:
    description: "Production configuration with Temporal Cloud and TLS"
    use_case: "Production deployment with observability and reliability"
    configuration:
      target: "temporal.production.example.com:7233"
      namespace: "production"
      task_queue: "default"
      task_queue_prefix: null
      priority_task_queues:
        10: "high_priority"
        90: "low_priority"
      default_activity_timeout: "15.minutes"
      default_retry_initial_interval: "30.seconds"
      default_retry_backoff: 2.0
      default_retry_max_attempts: 3
      logger: "Rails.logger"
      audit_log: true
      audit_logger: "Logger.new('log/activejob_temporal_audit.log')"
      validation_level: ":strict"
      enable_tracing: true
      metrics_provider: ":prometheus"
      metrics_port: 9394
      metrics_bind: "127.0.0.1"
      middleware_chain: "empty"
      max_payload_size_kb: 250
      payload_serializer: ":json"
      encrypt_payload: true
      encryption_key:
        id: "2026-05"
        key: "ENV['ACTIVEJOB_TEMPORAL_ENCRYPTION_KEY']"
      encryption_old_keys: []
      enable_search_attributes: true
      identity: "worker-01-us-east-1"
      tls: null
      tls_cert_path: "/etc/certs/client.pem"
      tls_key_path: "/etc/certs/client-key.pem"
      tls_server_root_ca_cert_path: "/etc/certs/root-ca.pem"
      tls_domain: "temporal.production.example.com"
      tls_cert_watch: true
      tls_reload_signal: "HUP"
    code_example: |
      # config/initializers/activejob_temporal.rb
      ActiveJob::Temporal.configure do |config|
        config.target = ENV.fetch("ACTIVEJOB_TEMPORAL_TARGET")
        config.namespace = 'production'
        config.task_queue = ENV.fetch("ACTIVEJOB_TEMPORAL_TASK_QUEUE", "default")
        config.task_queue_prefix = nil
        config.priority_task_queues = { 10 => "high_priority", 90 => "low_priority" }
        config.validation_level = :strict
        config.default_retry_max_attempts = 3
        config.audit_log = true
        config.audit_logger = Logger.new("log/activejob_temporal_audit.log")
        config.metrics_provider = :prometheus
        config.metrics_port = 9394
        config.encrypt_payload = true
        config.encryption_key = {
          id: "2026-05",
          key: ENV.fetch("ACTIVEJOB_TEMPORAL_ENCRYPTION_KEY")
        }
        config.identity = ENV.fetch('HOSTNAME', 'unknown-worker')
        config.tls_cert_path = ENV.fetch("ACTIVEJOB_TEMPORAL_TLS_CERT_PATH")
        config.tls_key_path = ENV.fetch("ACTIVEJOB_TEMPORAL_TLS_KEY_PATH")
        config.tls_server_root_ca_cert_path = ENV["ACTIVEJOB_TEMPORAL_TLS_SERVER_ROOT_CA_CERT_PATH"]
        config.tls_domain = ENV["ACTIVEJOB_TEMPORAL_TLS_DOMAIN"]
        config.tls_cert_watch = true
        # Validation happens automatically at end of block!
      end

  # High-throughput scenario with custom tuning
  high_throughput:
    description: "High-throughput configuration with relaxed limits and custom timeouts"
    use_case: "Heavy workload scenarios requiring larger payloads and longer timeouts"
    configuration:
      target: "temporal.production.example.com:7233"
      namespace: "production"
      task_queue: "default"
      task_queue_prefix: null
      default_activity_timeout: "30.minutes"
      default_retry_initial_interval: "1.minute"
      default_retry_backoff: 1.5
      default_retry_max_attempts: 5
      logger: "Rails.logger"
      audit_log: true
      audit_logger: null
      validation_level: ":strict"
      enable_tracing: true
      metrics_provider: ":prometheus"
      metrics_port: 9394
      metrics_bind: "127.0.0.1"
      middleware_chain: "empty"
      max_payload_size_kb: 512
      payload_serializer: ":message_pack"
      encrypt_payload: true
      encryption_key:
        id: "2026-05"
        key: "ENV['ACTIVEJOB_TEMPORAL_ENCRYPTION_KEY']"
      encryption_old_keys: []
      max_concurrent_activities: 300
      max_concurrent_workflow_tasks: 25
      enable_search_attributes: true
      identity: "worker-heavy-01"
      tls: null
      tls_cert_path: null
      tls_key_path: null
      tls_server_root_ca_cert_path: null
      tls_domain: null
      tls_cert_watch: false
      tls_reload_signal: "HUP"
    code_example: |
      # config/initializers/activejob_temporal.rb
      ActiveJob::Temporal.configure do |config|
        config.target = ENV.fetch("ACTIVEJOB_TEMPORAL_TARGET")
        config.namespace = 'production'
        config.task_queue = ENV.fetch("ACTIVEJOB_TEMPORAL_TASK_QUEUE", "default")
        config.task_queue_prefix = nil
        config.default_activity_timeout = 30.minutes
        config.default_retry_initial_interval = 1.minute
        config.default_retry_backoff = 1.5
        config.default_retry_max_attempts = 5
        config.validation_level = :strict
        config.max_payload_size_kb = 512
        config.payload_serializer = :message_pack
        config.max_concurrent_activities = 300
        config.max_concurrent_workflow_tasks = 25
        config.metrics_provider = :prometheus
        config.metrics_port = 9394
        config.encrypt_payload = true
        config.encryption_key = {
          id: "2026-05",
          key: ENV.fetch("ACTIVEJOB_TEMPORAL_ENCRYPTION_KEY")
        }
        config.identity = 'worker-heavy-01'
        # Validation happens automatically at end of block!
      end

# Configuration validation notes
validation:
  description: "Configuration is automatically validated using ActiveModel::Validations with i18n support"
  usage: |
    # Configuration is automatically validated at the end of the configure block
    # If validation fails, ConfigurationError is raised immediately by default
    ActiveJob::Temporal.configure do |config|
      config.target = "temporal.example.com:7233"
      config.namespace = "production"
      # Validation happens automatically here!
    end

    # During gradual migrations, warn without raising:
    ActiveJob::Temporal.configure do |config|
      config.validation_level = :warn
      config.target = ENV["ACTIVEJOB_TEMPORAL_TARGET"]
    end

    # You can also manually validate if you modify config directly:
    ActiveJob::Temporal.config.target = "new-host:7233"
    ActiveJob::Temporal.config.validate!  # Optional manual validation

  validation_rules:
    - "validation_level - Must be one of :strict, :warn, or :none"
    - "target - Must be in host:port format with alphanumeric/dots/hyphens in host and 1-5 digit port"
    - "namespace - Must contain only alphanumeric characters, hyphens, and underscores"
    - "default_activity_timeout - Must be a positive duration"
    - "default_retry_initial_interval - Must be a positive duration"
    - "default_retry_backoff - Must be >= 1.0"
    - "default_retry_max_attempts - Must be >= 0"
    - "dead_letter_queue - Optional, but when set must not be blank"
    - "dead_letter_after_attempts - Optional, but when set must be > 0 and requires dead_letter_queue"
    - "max_payload_size_kb - Must be between 1 and 2,097,152 KB"
    - "payload_serializer - Must be one of :json, :message_pack, :msgpack, or :marshal"
    - "encrypt_payload - Must be true or false"
    - "encryption_key - Required when encrypt_payload is true; when present, must be a Base64-encoded 32-byte key or key metadata"
    - "encryption_old_keys - Must be an array of Base64-encoded 32-byte keys or key metadata"
    - "max_concurrent_activities - Must be > 0"
    - "max_concurrent_workflow_tasks - Must be > 0"
    - "metrics_provider - Must be :none or :prometheus"
    - "metrics_port - Optional, but when set must be between 1 and 65535"
    - "metrics_bind - Must be present"
    - "audit_log - Must be true or false"
    - "audit_logger - Optional, but when set must respond to #info"
    - "middleware_chain - Must respond to #add and #call"

  error_handling: "Validation errors raise ActiveJob::Temporal::ConfigurationError by default. Set validation_level to :warn to log warnings and continue, or :none to skip validation."

# Type system reference
type_reference:
  String: "Ruby String object"
  Integer: "Ruby Integer"
  Float: "Ruby Float (decimal number)"
  Boolean: "Ruby true or false"
  Symbol: "Ruby Symbol, used for finite option sets such as :strict, :warn, and :none"
  Duration: "Numeric (seconds) or ActiveSupport::Duration object (e.g., 15.minutes, 30.seconds)"
  Logger: "Ruby Logger or Logger-compatible object with standard logging interface"
  Middleware::Chain: "Callable object that responds to #add and #call"
  Array: "Ruby Array object"

# Environment variable priority
environment_variables:
  description: "Environment variables provide 12-factor app compliance"
  priority: "ENV vars override defaults but are overridden by explicit configuration in initializers"
  supported_variables:
    - name: ACTIVEJOB_TEMPORAL_TARGET
      maps_to: target
      example: "temporal.production.com:7233"

    - name: ACTIVEJOB_TEMPORAL_NAMESPACE
      maps_to: namespace
      example: "production"

    - name: ACTIVEJOB_TEMPORAL_TASK_QUEUE_PREFIX
      maps_to: task_queue_prefix
      example: "rails-app-"

    - name: ACTIVEJOB_TEMPORAL_TASK_QUEUE
      maps_to: task_queue
      example: "default"

    - name: ACTIVEJOB_TEMPORAL_MAX_PAYLOAD_SIZE_KB
      maps_to: max_payload_size_kb
      example: "512"
      note: "Must be converted to integer"

    - name: ACTIVEJOB_TEMPORAL_PAYLOAD_SERIALIZER
      maps_to: payload_serializer
      example: "message_pack"
      note: "Must be converted to symbol"

    - name: ACTIVEJOB_TEMPORAL_MAX_CONCURRENT_ACTIVITIES
      maps_to: max_concurrent_activities
      example: "200"
      note: "Must be converted to integer"

    - name: ACTIVEJOB_TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS
      maps_to: max_concurrent_workflow_tasks
      example: "20"
      note: "Must be converted to integer"

    - name: ACTIVEJOB_TEMPORAL_METRICS_PROVIDER
      maps_to: metrics_provider
      example: "prometheus"
      note: "Must be converted to symbol"

    - name: ACTIVEJOB_TEMPORAL_METRICS_PORT
      maps_to: metrics_port
      example: "9394"
      note: "Must be converted to integer"

    - name: ACTIVEJOB_TEMPORAL_METRICS_BIND
      maps_to: metrics_bind
      example: "0.0.0.0"

    - name: ACTIVEJOB_TEMPORAL_AUDIT_LOG
      maps_to: audit_log
      example: "true"
      note: "Must be converted to boolean"

    - name: ACTIVEJOB_TEMPORAL_DEAD_LETTER_QUEUE
      maps_to: dead_letter_queue
      example: "failed_jobs"

    - name: ACTIVEJOB_TEMPORAL_DEAD_LETTER_AFTER_ATTEMPTS
      maps_to: dead_letter_after_attempts
      example: "3"
      note: "Must be converted to integer"

    - name: ACTIVEJOB_TEMPORAL_ENCRYPT_PAYLOAD
      maps_to: encrypt_payload
      example: "true"
      note: "Must be converted to boolean"

    - name: ACTIVEJOB_TEMPORAL_ENCRYPTION_KEY
      maps_to: encryption_key
      example: "SecureRandom.base64(32)"
      note: "Must be a Base64-encoded 32-byte AES-256-GCM key when encryption is enabled"
